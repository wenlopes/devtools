global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  # Métricas das aplicações via OTel Collector
  # O service_name é extraído automaticamente do resource attribute
  - job_name: 'otel-apps'
    static_configs:
      - targets: ['otel-collector:8889']
